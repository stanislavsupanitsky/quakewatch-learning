apiVersion: apps/v1
kind: Deployment
metadata:
    name: quakewatch-learning
spec:
    replicas: 2
    selector:
      matchLabels:
        app: quakewatch-learning
    template:
      metadata:
        labels:
          app: quakewatch-learning
      spec:
        containers:
          - name: quakewatch-learning
            image: stanislavsupanitsky/quakewatch-learning:1.2
            ports:
              - containerPort: 5000
            livenessProbe:
              httpGet:
                path: /health
                port: 5000
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 2
              failureThreshold: 3
            readinessProbe:
              httpGet:
                path: /health
                port: 5000
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 2
              failureThreshold: 3
