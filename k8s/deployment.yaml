apiVersion: apps/v1
kind: Deployment
metadata:
    name: quakewatch-learning
spec:
    replicas: 2
    selector:
      matchLabels:
        app: quakewatch-learning
    template:
      metadata:
        labels:
          app: quakewatch-learning
      spec:
        containers:
          - name: quakewatch-learning
            image: stanislavsupanitsky/quakewatch-learning:1.2
            ports:
              - containerPort: 5000
